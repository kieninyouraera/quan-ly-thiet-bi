<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Đăng Ký Lò Nung - Realtime</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
        }
        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
        }
        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        h2 { margin-top: 0; color: var(--primary); border-bottom: 2px solid var(--border); padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select, button {
            width: 100%; padding: 10px; border: 1px solid var(--border);
            border-radius: 4px; box-sizing: border-box; font-family: inherit;
        }
        button {
            background-color: var(--primary); color: white; border: none;
            cursor: pointer; font-weight: bold; margin-top: 10px;
        }
        button:hover { background-color: #1d4ed8; }
        .schedule-grid { display: grid; gap: 15px; }
        .booking-item {
            border-left: 4px solid var(--primary);
            padding: 10px 15px; background: var(--bg); border-radius: 4px;
            position: relative;
        }
        .booking-item.lo-vuong { border-left-color: #ef4444; }
        .booking-item.lo-nho { border-left-color: #10b981; }
        .btn-delete {
            position: absolute; top: 10px; right: 10px;
            width: auto; padding: 5px 10px; background-color: #ef4444; font-size: 12px;
        }
        .badge {
            display: inline-block; padding: 3px 8px; border-radius: 12px;
            font-size: 12px; font-weight: bold; color: white; margin-bottom: 5px;
        }
        .badge.lo-vuong { background: #ef4444; }
        .badge.lo-nho { background: #10b981; }
    </style>
</head>
<body>

    <h1 style="text-align: center; color: var(--primary);">📅 Quản Lý Lịch Sử Dụng Lò Nung (Live)</h1>

    <div class="container">
        <div class="card">
            <h2>Đăng Ký Lò</h2>
            <form id="bookingForm">
                <div class="form-group">
                    <label>Người sử dụng:</label>
                    <input type="text" id="userName" required placeholder="Nhập tên của bạn">
                </div>
                <div class="form-group">
                    <label>Chọn lò nung:</label>
                    <select id="furnaceId">
                        <option value="lo-vuong">Lò Nung Vuông</option>
                        <option value="lo-nho">Lò Nung Nhỏ</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Thời gian bắt đầu:</label>
                    <input type="datetime-local" id="startTime" required>
                </div>
                <div class="form-group">
                    <label>Thời gian kết thúc (Tắt lò):</label>
                    <input type="datetime-local" id="endTime" required>
                </div>
                <div class="form-group">
                    <label>Nhiệt độ cài đặt (°C):</label>
                    <input type="number" id="temperature" required placeholder="Ví dụ: 800">
                </div>
                <div class="form-group">
                    <label>Thời gian cần để nguội (Giờ):</label>
                    <input type="number" id="coolingTime" required min="0" step="0.5" placeholder="Ví dụ: 2.5">
                </div>
                <button type="submit" id="submitBtn">Đăng Ký Lịch</button>
            </form>
        </div>

        <div class="card">
            <h2>Lịch Đã Đăng Ký</h2>
            <div class="schedule-grid" id="scheduleContainer">
                <p>Đang tải dữ liệu...</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDzKmAmXw79NTDbzwpt_uHcOQ_qYJXrhhw",
            authDomain: "lab-furnace.firebaseapp.com",
            databaseURL: "https://lab-furnace-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "lab-furnace",
            storageBucket: "lab-furnace.firebasestorage.app",
            messagingSenderId: "669071696653",
            appId: "1:669071696653:web:ef99875d7b64a7fc01c644",
            measurementId: "G-P6E5H6B951"
        };

        // Khởi tạo Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const bookingsRef = ref(db, 'bookings');

        let localBookings = [];

        // Helper: Định dạng thời gian
        function formatDate(dateString) {
            const options = { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' };
            return new Date(dateString).toLocaleDateString('vi-VN', options);
        }

        // Kiểm tra xung đột
        function checkConflict(newBooking) {
            const newStart = new Date(newBooking.start).getTime();
            const newEndWithCooling = new Date(newBooking.end).getTime() + (newBooking.cool * 3600000);

            for (let b of localBookings) {
                if (b.furnace === newBooking.furnace) {
                    const bStart = new Date(b.start).getTime();
                    const bEndWithCooling = new Date(b.end).getTime() + (b.cool * 3600000);

                    if (Math.max(newStart, bStart) < Math.min(newEndWithCooling, bEndWithCooling)) {
                        return b;
                    }
                }
            }
            return null;
        }

        // Lắng nghe dữ liệu thay đổi (Realtime)
        onValue(bookingsRef, (snapshot) => {
            const data = snapshot.val();
            localBookings = [];
            const container = document.getElementById('scheduleContainer');
            container.innerHTML = '';

            if (data) {
                // Chuyển object Firebase thành array để xử lý
                Object.keys(data).forEach(key => {
                    localBookings.push({ ...data[key], firebaseId: key });
                });

                // Sắp xếp theo thời gian
                localBookings.sort((a, b) => new Date(a.start) - new Date(b.start));

                localBookings.forEach(b => {
                    const furnaceName = b.furnace === 'lo-vuong' ? 'Lò Nung Vuông' : 'Lò Nung Nhỏ';
                    const availableNext = new Date(new Date(b.end).getTime() + (b.cool * 3600000));

                    const div = document.createElement('div');
                    div.className = `booking-item ${b.furnace}`;
                    div.innerHTML = `
                        <span class="badge ${b.furnace}">${furnaceName}</span>
                        <button class="btn-delete" data-id="${b.firebaseId}">Xóa</button>
                        <p><strong>Người dùng:</strong> ${b.name}</p>
                        <p><strong>Nhiệt độ:</strong> ${b.temp}°C</p>
                        <p><strong>Thời gian nung:</strong> ${formatDate(b.start)} ➔ ${formatDate(b.end)}</p>
                        <p style="color: #ea580c; font-size: 0.9em;">
                            <em>*Nguội sau ${b.cool}h. Tiếp theo: <strong>${formatDate(availableNext)}</strong></em>
                        </p>
                    `;
                    container.appendChild(div);
                });

                // Gán sự kiện xóa
                document.querySelectorAll('.btn-delete').forEach(btn => {
                    btn.onclick = () => {
                        if(confirm("Xóa lịch này?")) remove(ref(db, 'bookings/' + btn.getAttribute('data-id')));
                    };
                });
            } else {
                container.innerHTML = '<p style="color: gray;">Chưa có lịch đăng ký.</p>';
            }
        });

        // Xử lý form submit
        document.getElementById('bookingForm').onsubmit = (e) => {
            e.preventDefault();
            const newBooking = {
                name: document.getElementById('userName').value,
                furnace: document.getElementById('furnaceId').value,
                start: document.getElementById('startTime').value,
                end: document.getElementById('endTime').value,
                temp: document.getElementById('temperature').value,
                cool: parseFloat(document.getElementById('coolingTime').value)
            };

            if (new Date(newBooking.start) >= new Date(newBooking.end)) {
                alert("Lỗi: Thời gian kết thúc phải sau thời gian bắt đầu!");
                return;
            }

            const conflict = checkConflict(newBooking);
            if (conflict) {
                alert(`Trùng lịch với ${conflict.name}!`);
                return;
            }

            push(bookingsRef, newBooking);
            document.getElementById('bookingForm').reset();
            alert("Đăng ký thành công!");
        };
    </script>
</body>
</html>
