<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Đăng Ký Thiết Bị Lab</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg); color: var(--text); margin: 0; padding: 20px;
        }
        .container { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 1fr 2fr; gap: 20px; }
        @media (max-width: 768px) { .container { grid-template-columns: 1fr; } }
        .card { background: var(--card-bg); padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        h2 { margin-top: 0; color: var(--primary); border-bottom: 2px solid var(--border); padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select, button { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 4px; box-sizing: border-box; font-family: inherit; }
        button { background-color: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:hover { background-color: #1d4ed8; }
        .schedule-grid { display: grid; gap: 15px; }
        .booking-item { border-left: 4px solid var(--primary); padding: 10px 15px; background: var(--bg); border-radius: 4px; position: relative; }
        
        /* Màu sắc cho từng loại thiết bị */
        .item-lo-nung { border-left-color: #ef4444; }
        .item-may-khuay { border-left-color: #f59e0b; }
        .item-may-li-tam { border-left-color: #8b5cf6; }

        .btn-delete { position: absolute; top: 10px; right: 10px; width: auto; padding: 5px 10px; background-color: #ef4444; font-size: 12px; }
        .badge { display: inline-block; padding: 3px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; color: white; margin-bottom: 5px; }
        .badge.lo-nung { background: #ef4444; }
        .badge.may-khuay { background: #f59e0b; }
        .badge.may-li-tam { background: #8b5cf6; }
    </style>
</head>
<body>

    <h1 style="text-align: center; color: var(--primary);">🧪 Quản Lý Thiết Bị Phòng Lab</h1>

    <div class="container">
        <div class="card">
            <h2>Đăng Ký Sử Dụng</h2>
            <form id="bookingForm">
                <div class="form-group">
                    <label>Người sử dụng:</label>
                    <input type="text" id="userName" required placeholder="Nhập tên">
                </div>
                <div class="form-group">
                    <label>Chọn thiết bị:</label>
                    <select id="deviceId">
                        <optgroup label="Lò Nung">
                            <option value="lo-vuong">Lò Nung Vuông</option>
                            <option value="lo-nho">Lò Nung Trong Phòng</option>
                        </optgroup>
                        <optgroup label="Máy Khuấy Từ">
                            <option value="khuay-tu">Máy Khuấy Từ</option>
                        </optgroup>
                        <optgroup label="Máy Li Tâm">
                            <option value="may-li-tam">Máy Li Tâm</option>
                        </optgroup>
                    </select>
                </div>
                <div class="form-group">
                    <label>Bắt đầu:</label>
                    <input type="datetime-local" id="startTime" required>
                </div>
                <div class="form-group">
                    <label>Kết thúc:</label>
                    <input type="datetime-local" id="endTime" required>
                </div>
                <div class="form-group" id="tempField">
                    <label>Thông số (Nhiệt độ/Tốc độ):</label>
                    <input type="text" id="param" placeholder="Ví dụ: 800°C hoặc 1000 rpm">
                </div>
                <div class="form-group">
                    <label>Thời gian nghỉ/nguội (Giờ):</label>
                    <input type="number" id="coolingTime" value="0" min="0" step="0.5">
                </div>
                <button type="submit">Xác Nhận Đăng Ký</button>
            </form>
        </div>

        <div class="card">
            <h2>Lịch Thiết Bị</h2>
            <div class="schedule-grid" id="scheduleContainer">
                <p>Đang tải dữ liệu...</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDzKmAmXw79NTDbzwpt_uHcOQ_qYJXrhhw",
            authDomain: "lab-furnace.firebaseapp.com",
            databaseURL: "https://lab-furnace-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "lab-furnace",
            storageBucket: "lab-furnace.firebasestorage.app",
            messagingSenderId: "669071696653",
            appId: "1:669071696653:web:ef99875d7b64a7fc01c644"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const bookingsRef = ref(db, 'bookings');
        let localBookings = [];

        function formatDate(d) {
            return new Date(d).toLocaleString('vi-VN', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'});
        }

        // Kiểm tra xung đột logic mới
        function checkConflict(newB) {
            const nS = new Date(newB.start).getTime();
            const nE = new Date(newB.end).getTime() + (newB.cool * 3600000);
            
            const overlaps = localBookings.filter(b => {
                if (b.device !== newB.device) return false;
                const bS = new Date(b.start).getTime();
                const bE = new Date(b.end).getTime() + (b.cool * 3600000);
                return Math.max(nS, bS) < Math.min(nE, bE);
            });

            // Nếu là máy khuấy từ, cho phép tối đa 3 người trùng giờ
            if (newB.device === 'khuay-tu') {
                return overlaps.length >= 3 ? { name: "Các máy khuấy đều đang bận" } : null;
            }
            
            // Các thiết bị khác chỉ cho phép 1 người
            return overlaps.length > 0 ? overlaps[0] : null;
        }

        onValue(bookingsRef, (snap) => {
            const data = snap.val();
            localBookings = [];
            const container = document.getElementById('scheduleContainer');
            container.innerHTML = '';

            if (data) {
                Object.keys(data).forEach(k => localBookings.push({...data[k], id: k}));
                localBookings.sort((a, b) => new Date(a.start) - new Date(b.start));

                localBookings.forEach(b => {
                    let typeClass = 'item-lo-nung', badgeClass = 'lo-nung', name = b.device;
                    if(b.device.includes('khuay')) { typeClass = 'item-may-khuay'; badgeClass = 'may-khuay'; name = "Máy Khuấy Từ"; }
                    if(b.device === 'may-li-tam') { typeClass = 'item-may-li-tam'; badgeClass = 'may-li-tam'; name = "Máy Li Tâm"; }
                    if(b.device === 'lo-vuong') name = "Lò Vuông";
                    if(b.device === 'lo-nho') name = "Lò Trong Phòng";

                    const div = document.createElement('div');
                    div.className = `booking-item ${typeClass}`;
                    div.innerHTML = `
                        <span class="badge ${badgeClass}">${name.toUpperCase()}</span>
                        <button class="btn-delete" onclick="window.del('${b.id}')">Xóa</button>
                        <p><strong>${b.userName}</strong> | ${b.param || ''}</p>
                        <p style="font-size:0.85em">${formatDate(b.start)} ➔ ${formatDate(b.end)}</p>
                        ${b.cool > 0 ? `<p style="color:orange; font-size:0.8em"><i>+ Nghỉ ${b.cool}h</i></p>` : ''}
                    `;
                    container.appendChild(div);
                });
            } else { container.innerHTML = '<p>Chưa có lịch.</p>'; }
        });

        window.del = (id) => confirm("Xóa lịch?") && remove(ref(db, 'bookings/'+id));

        document.getElementById('bookingForm').onsubmit = (e) => {
            e.preventDefault();
            const newB = {
                userName: document.getElementById('userName').value,
                device: document.getElementById('deviceId').value,
                start: document.getElementById('startTime').value,
                end: document.getElementById('endTime').value,
                param: document.getElementById('param').value,
                cool: parseFloat(document.getElementById('coolingTime').value || 0)
            };

            const conflict = checkConflict(newB);
            if (conflict) return alert("Bị trùng lịch với: " + (conflict.userName || conflict.name));

            push(bookingsRef, newB);
            e.target.reset();
            alert("Thành công!");
        };
    </script>
</body>
</html>
