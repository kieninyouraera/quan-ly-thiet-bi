<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Đăng Ký Thiết Bị Lab</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
        }
        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
        }
        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        h2 { margin-top: 0; color: var(--primary); border-bottom: 2px solid var(--border); padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select, button {
            width: 100%; padding: 10px; border: 1px solid var(--border);
            border-radius: 4px; box-sizing: border-box; font-family: inherit;
        }
        button {
            background-color: var(--primary); color: white; border: none;
            cursor: pointer; font-weight: bold; margin-top: 10px;
        }
        button:hover { background-color: #1d4ed8; }
        
        /* Giao diện danh sách lịch giống file mẫu */
        .schedule-grid { display: grid; gap: 15px; }
        .booking-item {
            border-left: 4px solid var(--primary);
            padding: 10px 15px; background: var(--bg); border-radius: 4px;
            position: relative;
        }
        
        /* Màu sắc theo loại thiết bị */
        .item-lo-nung { border-left-color: #ef4444; }
        .item-may-khuay { border-left-color: #f59e0b; }
        .item-may-li-tam { border-left-color: #8b5cf6; }

        .btn-delete {
            position: absolute; top: 10px; right: 10px;
            width: auto; padding: 5px 10px; background-color: #ef4444; font-size: 12px;
            border: none; color: white; border-radius: 4px; cursor: pointer;
        }
        .btn-delete:hover { background-color: #b91c1c; }

        .badge {
            display: inline-block; padding: 3px 8px; border-radius: 12px;
            font-size: 12px; font-weight: bold; color: white; margin-bottom: 5px;
            text-transform: uppercase;
        }
        .badge.lo-nung { background: #ef4444; }
        .badge.may-khuay { background: #f59e0b; }
        .badge.may-li-tam { background: #8b5cf6; }
    </style>
</head>
<body>

    <h1 style="text-align: center; color: var(--primary);">🧪 Quản Lý Thiết Bị Phòng Thí Nghiệm</h1>

    <div class="container">
        <div class="card">
            <h2>Đăng Ký Sử Dụng</h2>
            <form id="bookingForm">
                <div class="form-group">
                    <label>Người sử dụng:</label>
                    <input type="text" id="userName" required placeholder="Nhập tên">
                </div>
                <div class="form-group">
                    <label>Chọn thiết bị:</label>
                    <select id="deviceId">
                        <optgroup label="Lò Nung">
                            <option value="lo-vuong">Lò Nung Vuông</option>
                            <option value="lo-nho">Lò Nung Nhỏ</option>
                        </optgroup>
                        <optgroup label="Máy Khuấy Từ (Có 3 máy)">
                            <option value="khuay-tu">Máy Khuấy Từ</option>
                        </optgroup>
                        <optgroup label="Khác">
                            <option value="may-li-tam">Máy Li Tâm</option>
                        </optgroup>
                    </select>
                </div>
                <div class="form-group">
                    <label>Thời gian bắt đầu:</label>
                    <input type="datetime-local" id="startTime" required>
                </div>
                <div class="form-group">
                    <label>Thời gian kết thúc:</label>
                    <input type="datetime-local" id="endTime" required>
                </div>
                <div class="form-group">
                    <label>Thông số (Nhiệt độ/Tốc độ):</label>
                    <input type="text" id="param" placeholder="Ví dụ: 800°C hoặc 1000 rpm">
                </div>
                <div class="form-group">
                    <label>Thời gian nghỉ/nguội (Giờ):</label>
                    <input type="number" id="coolingTime" value="0" min="0" step="0.5">
                </div>
                <button type="submit">Đăng Ký Lịch</button>
            </form>
        </div>

        <div class="card">
            <h2>Lịch Đã Đăng Ký</h2>
            <div class="schedule-grid" id="scheduleContainer">
                <p>Đang tải dữ liệu...</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDzKmAmXw79NTDbzwpt_uHcOQ_qYJXrhhw",
            authDomain: "lab-furnace.firebaseapp.com",
            databaseURL: "https://lab-furnace-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "lab-furnace",
            storageBucket: "lab-furnace.firebasestorage.app",
            messagingSenderId: "669071696653",
            appId: "1:669071696653:web:ef99875d7b64a7fc01c644"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const bookingsRef = ref(db, 'bookings');
        let localBookings = [];

        function formatDate(dateString) {
            const options = { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' };
            return new Date(dateString).toLocaleDateString('vi-VN', options);
        }

        function checkConflict(newB) {
            const nS = new Date(newB.start).getTime();
            const nE = new Date(newB.end).getTime() + (newB.cool * 3600000);
            
            const overlaps = localBookings.filter(b => {
                if (b.device !== newB.device) return false;
                const bS = new Date(b.start).getTime();
                const bE = new Date(b.end).getTime() + (b.cool * 3600000);
                return Math.max(nS, bS) < Math.min(nE, bE);
            });

            if (newB.device === 'khuay-tu') {
                return overlaps.length >= 3 ? { userName: "Cả 3 máy khuấy đều đang bận" } : null;
            }
            return overlaps.length > 0 ? overlaps[0] : null;
        }

        onValue(bookingsRef, (snapshot) => {
            const data = snapshot.val();
            localBookings = [];
            const container = document.getElementById('scheduleContainer');
            container.innerHTML = '';

            if (data) {
                Object.keys(data).forEach(key => localBookings.push({...data[key], id: key}));
                localBookings.sort((a, b) => new Date(a.start) - new Date(b.start));

                localBookings.forEach(b => {
                    let typeClass = 'item-lo-nung', badgeClass = 'lo-nung', deviceName = b.device;
                    
                    if(b.device === 'khuay-tu') { typeClass = 'item-may-khuay'; badgeClass = 'may-khuay'; deviceName = "Máy Khuấy Từ"; }
                    else if(b.device === 'may-li-tam') { typeClass = 'item-may-li-tam'; badgeClass = 'may-li-tam'; deviceName = "Máy Li Tâm"; }
                    else if(b.device === 'lo-vuong') { deviceName = "Lò Nung Vuông"; }
                    else if(b.device === 'lo-nho') { deviceName = "Lò Nung Nhỏ"; }

                    const availableNext = new Date(new Date(b.end).getTime() + (b.cool * 3600000));

                    const div = document.createElement('div');
                    div.className = `booking-item ${typeClass}`;
                    div.innerHTML = `
                        <span class="badge ${badgeClass}">${deviceName}</span>
                        <button class="btn-delete" onclick="window.del('${b.id}')">Xóa</button>
                        <p><strong>Người dùng:</strong> ${b.userName}</p>
                        <p><strong>Thông số:</strong> ${b.param || 'N/A'}</p>
                        <p><strong>Thời gian:</strong> ${formatDate(b.start)} ➔ ${formatDate(b.end)}</p>
                        <p style="color: #ea580c; font-size: 0.9em;">
                            <em>*Nghỉ/nguội: ${b.cool}h. Tiếp theo lúc: <strong>${formatDate(availableNext)}</strong></em>
                        </p>
                    `;
                    container.appendChild(div);
                });
            } else {
                container.innerHTML = '<p style="color: gray;">Hiện tại chưa có ai đăng ký.</p>';
            }
        });

        window.del = (id) => {
            if(confirm("Bạn có chắc chắn muốn xóa lịch này?")) {
                remove(ref(db, 'bookings/' + id));
            }
        };

        document.getElementById('bookingForm').onsubmit = (e) => {
            e.preventDefault();
            const newB = {
                userName: document.getElementById('userName').value,
                device: document.getElementById('deviceId').value,
                start: document.getElementById('startTime').value,
                end: document.getElementById('endTime').value,
                param: document.getElementById('param').value,
                cool: parseFloat(document.getElementById('coolingTime').value || 0)
            };

            if (new Date(newB.start) >= new Date(newB.end)) {
                alert("Lỗi: Thời gian kết thúc phải sau thời gian bắt đầu!");
                return;
            }

            const conflict = checkConflict(newB);
            if (conflict) {
                alert(`Lỗi! Thiết bị này bận bởi ${conflict.userName}.\n(Bao gồm cả thời gian nghỉ)`);
                return;
            }

            push(bookingsRef, newB);
            e.target.reset();
            alert("Đăng ký thành công!");
        };
    </script>
</body>
</html>
